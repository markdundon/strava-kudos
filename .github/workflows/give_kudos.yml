name: Give Strava Kudos

#on:
#  schedule:
#    - cron: "30 5-23/6 * * *"
#  workflow_dispatch:

on:
  schedule:
    - cron: '0 7,9,11,13,15,17,19,21 * * *'   # Every 2 hours from 7 AM to 9 PM UTC
  workflow_dispatch:

env:
  STRAVA_EMAIL: ${{ secrets.STRAVA_EMAIL }}
  STRAVA_PASSWORD: ${{ secrets.STRAVA_PASSWORD }}

jobs:
  run-kudos-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers and dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Run kudos script
        run: python give_kudos.py
        env:
          STRAVA_EMAIL: ${{ secrets.STRAVA_EMAIL }}
          STRAVA_PASSWORD: ${{ secrets.STRAVA_PASSWORD }}
