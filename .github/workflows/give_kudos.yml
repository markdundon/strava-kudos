name: Give Strava Kudos

#on:
#  schedule:
#    - cron: "30 5-23/6 * * *"
#  workflow_dispatch:

on:
  schedule:
    - cron: '0 7,9,11,13,15,17,19,21 * * *'   # Every 2 hours from 7 AM to 9 PM UTC
  workflow_dispatch:

env:
  STRAVA_EMAIL: ${{ secrets.STRAVA_EMAIL }}
  STRAVA_PASSWORD: ${{ secrets.STRAVA_PASSWORD }}

jobs:
  run-kudos-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies for Playwright (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libgtk-3-0t64 \
            libxshmfence1 \
            libxss1

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run kudos script
        run: python give_kudos.py
        env:
          STRAVA_EMAIL: ${{ secrets.STRAVA_EMAIL }}
          STRAVA_PASSWORD: ${{ secrets.STRAVA_PASSWORD }}

      - name: Upload failure screenshot if any
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-failure-screenshot
          path: strava_login_failure.png
       

          
